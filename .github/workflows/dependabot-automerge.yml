name: Dependabot Automerge

on:
  workflow_run:
    workflows: [Test]
    types: [completed]
  status:

permissions:
  checks: read
  contents: write
  pull-requests: write
  statuses: read

concurrency:
  group: dependabot-automerge-${{ github.event.workflow_run.id || github.event.sha }}
  cancel-in-progress: true

jobs:
  automerge:
    if: >-
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
      || (github.event_name == 'status' && github.event.context == 'Vercel')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Resolve pull request
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha || github.event.sha }}
        run: |
          set -euo pipefail

          pr_number="$(gh api -H 'Accept: application/vnd.github+json' \
            "repos/${GITHUB_REPOSITORY}/commits/${HEAD_SHA}/pulls" \
            --jq 'map(select(.state == "open"))[0].number // empty')"

          echo "number=${pr_number}" >> "$GITHUB_OUTPUT"

      - name: Check merge gates
        id: gates
        if: steps.pr.outputs.number != ''
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          set -euo pipefail

          pr_json="$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}")"
          state="$(echo "$pr_json" | jq -r '.state')"
          draft="$(echo "$pr_json" | jq -r '.draft')"
          author="$(echo "$pr_json" | jq -r '.user.login')"
          head_sha="$(echo "$pr_json" | jq -r '.head.sha')"

          echo "ready=false" >> "$GITHUB_OUTPUT"
          echo "head_sha=${head_sha}" >> "$GITHUB_OUTPUT"

          if [[ "$state" != "open" || "$draft" != "false" || "$author" != "dependabot[bot]" ]]; then
            exit 0
          fi

          vercel_state="$(gh api "repos/${GITHUB_REPOSITORY}/commits/${head_sha}/status" \
            --jq '([.statuses[] | select(.context == "Vercel")] | max_by(.id) | .state) // empty')"
          validation_state="$(gh api -H 'Accept: application/vnd.github+json' \
            "repos/${GITHUB_REPOSITORY}/commits/${head_sha}/check-runs" \
            --jq '([.check_runs[] | select(.name == "validation")] | max_by(.id) | .conclusion) // empty')"

          echo "validation=${validation_state:-missing}"
          echo "vercel=${vercel_state:-missing}"

          if [[ "$vercel_state" == "success" && "$validation_state" == "success" ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Merge pull request
        if: steps.gates.outputs.ready == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          HEAD_SHA: ${{ steps.gates.outputs.head_sha }}
        run: |
          gh pr merge "$PR_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --rebase \
            --delete-branch \
            --match-head-commit "$HEAD_SHA"
