name: Dependabot Automerge

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_run:
    workflows: [Dependabot Validation]
    types: [completed]
  status:

permissions:
  checks: read
  contents: write
  pull-requests: write
  statuses: read

concurrency:
  group: dependabot-automerge-${{ github.event.pull_request.number || github.event.workflow_run.id || github.event.sha }}
  cancel-in-progress: true

jobs:
  automerge:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Resolve pull request
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          pr_number=""

          if [[ "${{ github.event_name }}" == "pull_request_target" ]]; then
            pr_number="${{ github.event.pull_request.number }}"
          elif [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            pr_number="${{ github.event.workflow_run.pull_requests[0].number || '' }}"
          elif [[ "${{ github.event_name }}" == "status" ]]; then
            pr_number="$(gh api -H 'Accept: application/vnd.github+json' repos/${GITHUB_REPOSITORY}/commits/${{ github.event.sha }}/pulls --jq 'map(select(.state == "open"))[0].number // empty')"
          fi

          echo "number=${pr_number}" >> "$GITHUB_OUTPUT"

      - name: Check merge gates
        id: gates
        if: steps.pr.outputs.number != ''
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          set -euo pipefail

          pr_json="$(gh api repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER})"
          state="$(echo "$pr_json" | jq -r '.state')"
          draft="$(echo "$pr_json" | jq -r '.draft')"
          author="$(echo "$pr_json" | jq -r '.user.login')"
          head_sha="$(echo "$pr_json" | jq -r '.head.sha')"

          if [[ "$state" != "open" || "$draft" != "false" || "$author" != "dependabot[bot]" ]]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          vercel_state="$(gh api repos/${GITHUB_REPOSITORY}/commits/${head_sha}/status --jq '([.statuses[] | select(.context == "Vercel")] | sort_by(.created_at) | last | .state) // empty')"
          validation_state="$(gh api -H 'Accept: application/vnd.github+json' repos/${GITHUB_REPOSITORY}/commits/${head_sha}/check-runs --jq '([.check_runs[] | select(.name == "validation")] | sort_by(.started_at) | last | .conclusion) // empty')"

          if [[ "$vercel_state" == "success" && "$validation_state" == "success" ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Merge pull request
        if: steps.gates.outputs.ready == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: gh pr merge "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --rebase
