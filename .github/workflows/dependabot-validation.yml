name: Dependabot Validation

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

concurrency:
  group: dependabot-validation-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validation:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout pull request head
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install dependencies
        env:
          CI: true
        run: pnpm install --frozen-lockfile

      - name: Select validation scripts
        id: scripts
        run: |
          node -e "const pkg=require('./package.json'); const scripts=pkg.scripts ?? {}; const names=[]; if (scripts['test:lint']) names.push('test:lint'); else if (scripts.lint && !scripts.lint.includes('--write')) names.push('lint'); if (scripts['test:types']) names.push('test:types'); if (scripts.test) names.push('test'); require('fs').appendFileSync(process.env.GITHUB_OUTPUT, `scripts=${names.join(' ')}\n`);"

      - name: Run validation scripts
        if: steps.scripts.outputs.scripts != ''
        env:
          CI: true
        run: |
          for script in ${{ steps.scripts.outputs.scripts }}; do
            echo "::group::pnpm run ${script}"
            pnpm run "${script}"
            echo "::endgroup::"
          done
